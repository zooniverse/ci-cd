name: Deploy Lambda Function

on:
  # Run this workflow from other workflows
  workflow_call:
    inputs:
      function:
        description: 'Name of function in AWS'
        required: true
        type: string
      directory:
        description: 'Location of function to upload'
        required: true
        default: 'kinesis-to-http'
        type: string

jobs:
  deploy_lambda:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./${{ inputs.directory }}
    name: Deploy staging lambda
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.LAMBDA_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.LAMBDA_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          role-session-name: gha-lambda-deploy

      - name: Install dependencies
        run: |
          pip install --target . requests

      - name: Zip package
        run: |
          zip -r ./lambda.zip .

      - name: AWS Deploy
        run: |
          aws lambda update-function-code \
            --function-name ${{ inputs.function }} \
            --zip-file fileb://lambda.zip
