name: Purge Front Door Cache

on:
  # Run this workflow from other workflows
  workflow_call:
    inputs:
      fdname:
        description: 'Front Door Name'
        required: true
        type: string
      path:
        description: 'Content path to purge'
        required: true
        type: string
      endpoint:
        description: 'Endpoint to purge'
        required: true
        type: string
      domain:
        description: 'Domain to purge'
        required: true
        type: string
    secrets:
      creds:
        required: true

jobs:
  purge_cache:
    runs-on: ubuntu-latest
    steps:
    - name: Log in
      uses: azure/login@v2
      with:
        creds: ${{ secrets.creds }}

    - name: Purge Cache Path
      id: upload
      uses: azure/CLI@v2
      with:
        inlineScript: |
          az afd endpoint purge \
              --resource-group 'static-sites' \
              --profile-name '${{ inputs.fdname }}' \
              --endpoint-name '${{ inputs.endpoint }}' \
              --domains '${{ inputs.domain }}' \
              --content-paths '${{ inputs.path }}'
